<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🩺 AI Medical Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2193b0,#6dd5ed);

}

.chat-container{

width:900px;
height:92vh;

display:flex;
flex-direction:column;

border-radius:25px;
overflow:hidden;

background:white;

box-shadow:0 15px 50px rgba(0,0,0,.2);

}

.header{

padding:20px;

background:linear-gradient(90deg,#1565C0,#29B6F6);

color:white;
text-align:center;

}

.header h1{

font-size:30px;

}

.header p{

margin-top:5px;
opacity:.9;

}

.chat-box{

flex:1;
overflow-y:auto;

padding:25px;

background:#f6f9fc;

}

.message{

display:flex;

margin-bottom:18px;

animation:fade .3s;

}

.user{

justify-content:flex-end;

}

.assistant{

justify-content:flex-start;

}

.avatar{

width:45px;
height:45px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;

margin:0 10px;

}

.user .avatar{

background:#2196F3;
color:white;
order:2;

}

.assistant .avatar{

background:#00C853;
color:white;

}

.bubble{

max-width:75%;

padding:15px 18px;

border-radius:18px;

line-height:1.7;

word-wrap:break-word;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.user .bubble{

background:#2196F3;

color:white;

border-bottom-right-radius:6px;

}

.assistant .bubble{

background:white;

color:#333;

border-bottom-left-radius:6px;

}

.input-area{

display:flex;

gap:15px;

padding:18px;

background:white;

border-top:1px solid #ddd;

position:sticky;
bottom:0;

}

textarea{

flex:1;

height:60px;

resize:none;

padding:15px;

border-radius:12px;

border:2px solid #ddd;

font-size:15px;

outline:none;

}

textarea:focus{

border-color:#2196F3;

}

button{

border:none;

cursor:pointer;

padding:14px 25px;

border-radius:12px;

font-size:15px;

font-weight:600;

transition:.3s;

}

.send-btn{

background:#2196F3;
color:white;

}

.send-btn:hover{

background:#1976D2;

}

.clear-btn{

background:#F44336;
color:white;

margin-top:12px;

}

.clear-btn:hover{

background:#D32F2F;

}

.error{

padding:12px;

background:#FFEBEE;

color:#C62828;

text-align:center;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(10px);

}

to{

opacity:1;
transform:translateY(0);

}

}

::-webkit-scrollbar{

width:8px;

}

::-webkit-scrollbar-thumb{

background:#2196F3;
border-radius:20px;

}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">

<h1>🩺 AI Medical Assistant</h1>

<p>Powered by LangChain + FAISS + Groq + Flask</p>

</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<div class="chat-box" id="chatBox">

{% for msg in messages %}

<div class="message {{msg.role}}">

<div class="avatar">

{% if msg.role=="assistant" %}
🩺
{% else %}
👤
{% endif %}

</div>

<div class="bubble">

{{ msg.content.replace('\n','<br>')|safe }}

</div>

</div>

{% endfor %}

</div>

<form method="POST" action="{{ url_for('index') }}">

<div class="input-area">

<textarea
id="prompt"
name="prompt"
placeholder="Ask any medical question..."
required></textarea>

<button class="send-btn">

📤 Send

</button>

</div>

</form>

<form method="GET" action="{{ url_for('clear') }}">

<div style="text-align:center;padding-bottom:15px;background:white;">

<button class="clear-btn">

🗑️ Clear Conversation

</button>

</div>

</form>

</div>

<script>

const chatBox=document.getElementById("chatBox");

chatBox.scrollTop=chatBox.scrollHeight;

const textarea=document.getElementById("prompt");

textarea.addEventListener("keydown",function(e){

if(e.key==="Enter" && !e.shiftKey){

e.preventDefault();

this.form.submit();

}

});

</script>

</body>

</html>
